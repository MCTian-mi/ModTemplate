name: Generate Changelog
description: Generate GitHub-style release notes for a tag and expose the file path.

inputs:
  tag:
    description: Release tag to resolve notes for.
    required: true
  repository:
    description: Repository slug in owner/name form.
    required: true
  output-file:
    description: Relative path to write the changelog into.
    required: false
    default: build/gh_changelog.md

outputs:
  path:
    description: Path to the generated changelog file.
    value: ${{ steps.write.outputs.path }}

runs:
  using: composite
  steps:
    - name: Resolve changelog text
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ inputs.tag }}
        REPOSITORY: ${{ inputs.repository }}
        OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        set -euo pipefail
        mkdir -p "$(dirname "$OUTPUT_FILE")"

        if gh release view "$TAG" --repo "$REPOSITORY" --json body --jq '.body' > "$OUTPUT_FILE" 2>/dev/null && [ -s "$OUTPUT_FILE" ]; then
          echo "Using existing GitHub release body for $TAG."
        elif gh api -X POST "/repos/$REPOSITORY/releases/generate-notes" -f tag_name="$TAG" --jq '.body' > "$OUTPUT_FILE" 2>/dev/null && [ -s "$OUTPUT_FILE" ]; then
          echo "Generated GitHub release notes for $TAG."
        else
          cat > "$OUTPUT_FILE" <<'EOF'
  No changelog found.
  EOF
  fi

  - name: Export changelog path
    id: write
    shell: bash
    env:
      OUTPUT_FILE: ${{ inputs.output-file }}
    run: |
      echo "path=$OUTPUT_FILE" >> "$GITHUB_OUTPUT"
