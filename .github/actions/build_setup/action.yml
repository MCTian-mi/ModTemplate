name: Build Setup
description: Setup for standard Java builds

inputs:
  update-cache:
    description: If cache should be updated
    required: false
    default: 'false'

runs:
  using: 'composite'

  steps:
    # JDK 25: matches the project's Gradle toolchain (build-logic/.../jvm.gradle.kts) and the
    # version Gradle 9.6 itself runs on. Using an older JDK here would fail to run the wrapper.
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 25

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-write-only: ${{ inputs.update-cache }}
        add-job-summary: 'always'
        gradle-home-cache-includes: |
          caches
          caches/retro_futura_gradle
          notifications
          jdks
          wrapper
