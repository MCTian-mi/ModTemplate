name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mod version'
        required: true
        type: string
      release-type:
        description: 'Release type'
        type: choice
        default: 'beta'
        options:
          - 'release'
          - 'beta'
          - 'alpha'
      publish-cf:
        description: 'Publish to CF'
        default: true
        type: boolean
      publish-mr:
        description: 'Publish to MR'
        default: true
        type: boolean
      publish-gh:
        description: 'Publish to Github'
        default: true
        type: boolean
      publish-maven:
        description: 'Publish to Maven'
        default: true
        type: boolean
      deploy-debug:
        description: 'Deploy debug (validate without uploading)'
        default: false
        type: boolean
      overwrite:
        description: 'Overwrite current tag (if exists)'
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          # Full history and tags are required for git-derived versions, changelog generation,
          # and release tag handling in the Gradle publishing convention.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Build
        uses: ./.github/actions/build_setup

      - name: Determine release tag
        id: tag
        env:
          MOD_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch resolves the tag name from Gradle using the same MOD_VERSION
            # input that the publish convention consumes.
            version=$(gradle -q printModVersion | tail -n 1)
            echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release tag exists
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish-gh }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            if [ "${{ inputs.overwrite }}" = "true" ]; then
              echo "Overwriting existing tag ${TAG}."
              git tag -f "${TAG}" "$GITHUB_SHA"
              git push --force origin "refs/tags/${TAG}"
            else
              echo "Tag ${TAG} already exists on origin; keeping it (overwrite disabled)."
            fi
          elif git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            git push origin "refs/tags/${TAG}"
          else
            git tag "${TAG}" "$GITHUB_SHA"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Build jars
        run: gradle build --build-cache

      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_LOCATION: build/gh_changelog.md
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p "$(dirname "$CHANGELOG_LOCATION")"
          if gh release view "$TAG" --json body --jq '.body' > "$CHANGELOG_LOCATION" 2>/dev/null && [ -s "$CHANGELOG_LOCATION" ]; then
            echo "Using existing GitHub release notes for $TAG."
          elif gh api -X POST "/repos/${{ github.repository }}/releases/generate-notes" -f tag_name="$TAG" --jq '.body' > "$CHANGELOG_LOCATION" 2>/dev/null && [ -s "$CHANGELOG_LOCATION" ]; then
            echo "Generated release notes for $TAG."
          else
            echo "No changelog found" > "$CHANGELOG_LOCATION"
          fi
          echo "path=$CHANGELOG_LOCATION" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish-gh }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; reusing it."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "${{ steps.changelog.outputs.path }}" \
              --verify-tag
          fi

      - name: Upload jars to GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish-gh }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" build/libs/*.jar --clobber

      # Skip when nothing is selected for Gradle-side targets, otherwise publishModRelease would
      # fail with "no publish targets configured" (for example, a GitHub-only manual release).
      - name: Publish to Modrinth, CurseForge and Maven
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish-mr || inputs.publish-cf || inputs.publish-maven || inputs.deploy-debug }}
        env:
          CHANGELOG_LOCATION: ${{ steps.changelog.outputs.path }}
          MOD_VERSION: ${{ inputs.version }}
          RELEASE_TYPE: ${{ inputs.release-type || 'release' }}
          DEPLOYMENT_DEBUG: ${{ inputs.deploy-debug }}
          PUBLISH_MODRINTH: ${{ inputs.publish-mr }}
          PUBLISH_CURSEFORGE: ${{ inputs.publish-cf }}
          PUBLISH_MAVEN: ${{ inputs.publish-maven }}
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GITHUB_TAG: ${{ steps.tag.outputs.tag }}
        run: gradle publishModRelease --build-cache
